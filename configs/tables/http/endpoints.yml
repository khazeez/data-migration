sheet:
  spreadsheet_id: 11xTqz5xSSFT_9FzgoO3iwn0U-TcKaezTjm62cRq3WQI
  worksheet: HTTP

table: endpoints

mapping:
  Connection:
    column: backend_id
    transform: lookup
    lookup:
      table: backends
      from: name
      to: id
  Endpoint Path:
    column: path
  Method:
    column: method
  Access:
    column: type
  Allowed Headers:
    column: allowed_headers
  Interceptor:
    column: request_validator_id
    transform: lookup
    lookup:
      table: request_validators
      from: name
      to: id


defaults:
  id: uuid
  created_at: now
  updated_at: now
  active: true
  skip_activity_log: false
  allowed_response_headers: ""
  sql_statement: ""
  javascript: ""
  response: ""
  request_timeout: 0
  rate_limit: 0
  rate_limit_type: second
  enable_cors: false
  allow_origin: ""
  allow_headers: ""
  allow_credential: ""
  expose_headers: ""
  max_age: 0
  allow_private_network: false
  grpc_service: ""
  webhook_url: ""
  request_transformer_id: ""
  log_transformer_id: ""

filter:
  column: Is Deployed
  value: Deployed

unique: [path]

on_conflict:
  action: ignore
  keys: []