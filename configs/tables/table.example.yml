sheet:
  spreadsheet_id: 1xxxxxxxx
  worksheet: Role

table: m_role

mapping:
  Role Name:
    column: name
  Active:
    column: is_active
    transform: string_to_bool   # Y/N, 1/0, yes/no → true/false

defaults:
  id: uuid
  created_at: now
  updated_at: now
  created_by: system

# Opsional: transform yang didukung
# string_to_bool   : Y/N, yes/no, 1/0, true/false, active/inactive, deployed/undeployed → boolean
# lower            : "Nama" → "nama"
# upper            : "nama" → "NAMA"
# trim             : "  nama  " → "nama"
# lookup           : ganti nilai dengan hasil query ke tabel lain
#
# Contoh lookup:
#   customer_name:              # kolom sheet
#     column: customer_id       # kolom DB (FK)
#     transform: lookup
#     lookup:
#       table: customer         # tabel tujuan
#       from: name              # kolom dicocokkan
#       to: id                  # kolom diambil nilainya

# Opsional: filter baris yang akan di-insert
# filter:
#   column: is_active
#   value: true

# Opsional: atur perilaku saat ada duplicate key
# on_conflict:
#   action: ignore    # skip duplikat (tanpa perlu unique index)
#   keys: [name]