sheet:
  spreadsheet_id: 11xTqz5xSSFT_9FzgoO3iwn0U-TcKaezTjm62cRq3WQI
  worksheet: Consumer Credential

table: credentials

mapping:
  client:
    column: client_id
    transform: lookup
    lookup:
      table: clients
      from: name
      to: id
  name:
    column: name
  Expired Date:
    column: expired_date
  API KEY:
    column: api_key
  Token: 
    column: token
  IP Whitelist:
    column: ip_whitelist
  type:
    column: type

defaults:
  id: uuid
  created_at: now
  updated_at: now
  active: true

filter:
  column: type
  values: [oauth2, apikey]

unique: [api_key]

on_conflict:
  action: ignore
  keys: [api_key]