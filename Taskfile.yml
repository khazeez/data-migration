version: "3"

dotenv: [".env"]

vars:
  JOB: master-data

tasks:
  default:
    deps: [build]

  build:
    desc: Build the binary
    cmds:
      - go build -o sheet-loader.exe ./cmd/

  clean:
    desc: Remove build artifacts
    cmds:
      - go clean
      - del /f sheet-loader.exe

  test:
    desc: Run all tests
    cmds:
      - go test -v ./internal/...

  run:
    desc: Execute job
    cmds:
      - go run ./cmd/ -job "{{.JOB}}" {{.CLI_ARGS}}

  dry-run:
    desc: Validate without inserting
    cmds:
      - go run ./cmd/ -job "{{.JOB}}" -dry-run {{.CLI_ARGS}}

  list:
    desc: List available jobs
    cmds:
      - go run ./cmd/ -list

  fmt:
    desc: Format Go source code
    cmds:
      - go fmt ./...

  deps:
    desc: Tidy Go module dependencies
    aliases: [tidy]
    cmds:
      - go mod tidy
