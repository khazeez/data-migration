version: "3"

dotenv: [".env"]

vars:
  JOB: master-data

tasks:
  default:
    deps: [build]

  build:
    desc: Build the binary
    cmds:
      - go build -o sheet-loader.exe ./cmd/

  clean:
    desc: Remove build artifacts
    cmds:
      - go clean
      - del /f sheet-loader.exe

  run:
    desc: Execute job (e.g. task run -- backend-api)
    cmds:
      - go run ./cmd/ {{default "master-data" .CLI_ARGS}}

  dry-run:
    desc: Validate without inserting
    cmds:
      - go run ./cmd/ -dry-run {{default "master-data" .CLI_ARGS}}

  test:
    desc: Validate without inserting (alias: dry-run)
    cmds:
      - go run ./cmd/ -dry-run {{default "master-data" .CLI_ARGS}}

  run-all:
    desc: Execute all jobs
    cmds:
      - go run ./cmd/ -all

  list:
    desc: List available jobs
    cmds:
      - go run ./cmd/ -list

  fmt:
    desc: Format Go source code
    cmds:
      - go fmt ./...

  deps:
    desc: Tidy Go module dependencies
    aliases: [tidy]
    cmds:
      - go mod tidy
